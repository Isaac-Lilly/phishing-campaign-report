name: Phishing Campaign Report

on:
  schedule:
    - cron: '0 6 * * *'   # daily at 06:00 UTC
  workflow_dispatch:        # manual trigger for testing

permissions:
  contents: write

jobs:
  generate-report:
    name: Daily Campaign Report
    runs-on: ubuntu-latest
    # Splunk enrichment now runs inside the Azure Function App.
    # The Function App has a 45-minute timeout per invocation.
    # 120 minutes gives headroom for multiple campaigns in one run.
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run campaign merge
        env:
          # ── Workday ───────────────────────────────────────────────
          WORKDAY_CLIENT_ID:     ${{ secrets.WORKDAY_CLIENT_ID }}
          WORKDAY_CLIENT_SECRET: ${{ secrets.WORKDAY_CLIENT_SECRET }}
          WORKDAY_TOKEN_URL:     ${{ secrets.WORKDAY_TOKEN_URL }}
          WORKDAY_API_URL:       ${{ secrets.WORKDAY_API_URL }}
          WORKDAY_SCOPE:         ${{ secrets.WORKDAY_SCOPE }}

          # ── Proofpoint ────────────────────────────────────────────
          PROOFPOINT_BASE_URL: ${{ secrets.PROOFPOINT_BASE_URL }}
          PROOFPOINT_API_KEY:  ${{ secrets.PROOFPOINT_API_KEY }}

          # ── Azure Function (Splunk enrichment) ────────────────────
          # The Function App proxies Splunk queries through a static IP
          # whitelisted in lilly-infosec.splunkcloud.com:8089.
          # Format: https://func-splunk-proxy.azurewebsites.net/api/splunk_enrich?code=<key>
          # If not set, the pipeline falls back to direct Splunk queries
          # (requires SPLUNK_API_KEY and GitHub Actions IPs whitelisted in Splunk).
          AZURE_FUNCTION_URL: ${{ secrets.AZURE_FUNCTION_URL }}

          # ── Power Automate ────────────────────────────────────────
          # file_type='excel' → ProofPoint_WorkDay_Splunk_Auto_Backup
          # file_type='csv'   → Autopipeline_MasterReports
          POWER_AUTOMATE_WEBHOOK_URL:  ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
          # Only needed if your Power Automate trigger requires auth header.
          # Leave secret blank or unset if trigger is set to "Anyone".
          POWER_AUTOMATE_WEBHOOK_AUTH: ${{ secrets.POWER_AUTOMATE_WEBHOOK_AUTH }}

          # ── Proofpoint tuning ─────────────────────────────────────
          PROOFPOINT_PAGE_SIZE:               '500'
          PROOFPOINT_RATE_LIMIT_DELAY:        '1.0'
          PROOFPOINT_RETRY_DELAY:             '5.0'
          PROOFPOINT_MAX_RETRIES:             '3'
          PROOFPOINT_DISCOVERY_LOOKBACK_DAYS: '40'
          PROOFPOINT_DISCOVERY_MAX_PAGES:     '5'
          START_DATE_OFFSET_DAYS:             '-2'
          END_DATE_OFFSET_DAYS:               '3'

          # ── General ───────────────────────────────────────────────
          LOG_LEVEL:       'INFO'
          LOG_USE_UTC:     'true'
          STATE_FILE_PATH: 'campaign_state.json'

        run: python campaign_merge.py

      - name: Commit campaign state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add campaign_state.json
          git diff --cached --quiet \
            || git commit -m "chore: update campaign_state.json [skip ci]"
          git push