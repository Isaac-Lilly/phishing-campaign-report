name: Phishing Campaign Backfill

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: 'Backfill start date (YYYY-MM-DD). Scans month-by-month from this date.'
        required: true
        default: '2025-01-01'
      end_date:
        description: 'Backfill end date (YYYY-MM-DD). Leave blank to scan up to today.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  backfill:
    name: Campaign Backfill
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run campaign backfill
        env:
          # ── Workday ───────────────────────────────────────────────
          WORKDAY_CLIENT_ID:     ${{ secrets.WORKDAY_CLIENT_ID }}
          WORKDAY_CLIENT_SECRET: ${{ secrets.WORKDAY_CLIENT_SECRET }}
          WORKDAY_TOKEN_URL:     ${{ secrets.WORKDAY_TOKEN_URL }}
          WORKDAY_API_URL:       ${{ secrets.WORKDAY_API_URL }}
          WORKDAY_SCOPE:         ${{ secrets.WORKDAY_SCOPE }}

          # ── Proofpoint ────────────────────────────────────────────
          PROOFPOINT_BASE_URL: ${{ secrets.PROOFPOINT_BASE_URL }}
          PROOFPOINT_API_KEY:  ${{ secrets.PROOFPOINT_API_KEY }}

          # ── Azure Function (Splunk enrichment) ────────────────────
          AZURE_FUNCTION_URL: ${{ secrets.AZURE_FUNCTION_URL }}

          # ── Power Automate ────────────────────────────────────────
          POWER_AUTOMATE_WEBHOOK_URL:  ${{ secrets.POWER_AUTOMATE_WEBHOOK_URL }}
          POWER_AUTOMATE_WEBHOOK_AUTH: ${{ secrets.POWER_AUTOMATE_WEBHOOK_AUTH }}

          # ── Backfill dates ────────────────────────────────────────
          # BACKFILL_FROM triggers month-by-month scanning from this date.
          # BACKFILL_TO optionally caps the scan end date (defaults to today).
          BACKFILL_FROM: ${{ github.event.inputs.start_date }}
          BACKFILL_TO:   ${{ github.event.inputs.end_date }}

          # ── Proofpoint tuning ─────────────────────────────────────
          PROOFPOINT_PAGE_SIZE:               '500'
          PROOFPOINT_RATE_LIMIT_DELAY:        '1.0'
          PROOFPOINT_RETRY_DELAY:             '5.0'
          PROOFPOINT_MAX_RETRIES:             '3'
          PROOFPOINT_DISCOVERY_LOOKBACK_DAYS: '20'
          PROOFPOINT_DISCOVERY_MAX_PAGES:     '5'
          START_DATE_OFFSET_DAYS:             '-2'
          END_DATE_OFFSET_DAYS:               '3'

          # ── General ───────────────────────────────────────────────
          LOG_LEVEL:       'INFO'
          LOG_USE_UTC:     'true'
          STATE_FILE_PATH: 'campaign_state.json'

        run: python campaign_merge.py

      - name: Commit campaign state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add campaign_state.json
          git diff --cached --quiet \
            || git commit -m "chore: update campaign_state.json [skip ci]"
          git push